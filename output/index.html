    <script>
        // ===== アニメーション制御 =====
        let animDates = [];
        let animTotalFrames = 0;
        let animYearBoundary = 0;
        let animCurrentFrame = 0;
        let animPlaying = false;
        let animTimer = null;
        const ANIM_INTERVAL_MS = 500; // フレーム間隔 (ミリ秒)

        const btnPlay = document.getElementById('btn-play');
        const btnRewind = document.getElementById('btn-rewind');
        const btnFfwd = document.getElementById('btn-ffwd');
        const progressBar = document.getElementById('anim-progress');
        const dateDisplay = document.getElementById('anim-date-display');
        const mapFrame = document.getElementById('map-frame');

        // iframe からのメッセージ受信
        window.addEventListener('message', function(event) {
            const msg = event.data;
            if (!msg || !msg.type) return;

            if (msg.type === 'animation_ready') {
                animDates = msg.dates;
                animTotalFrames = msg.totalFrames;
                animYearBoundary = msg.yearBoundaryIndex;
                animCurrentFrame = animTotalFrames - 1; // 最新フレーム

                // UIを有効化
                btnPlay.disabled = false;
                btnRewind.disabled = false;
                btnFfwd.disabled = false;
                progressBar.disabled = false;
                progressBar.max = animTotalFrames - 1;
                progressBar.value = animCurrentFrame;

                updateDateDisplay();
            }
        });

        // 日付表示を更新
        function updateDateDisplay() {
            if (animDates.length === 0) return;
            const d = animDates[animCurrentFrame];
            // 年境界の前後で表示を分ける
            const isCurrentYear = animCurrentFrame >= animYearBoundary;
            const label = isCurrentYear ? '今年' : '前年';
            dateDisplay.textContent = d + ' (' + label + ')';
            progressBar.value = animCurrentFrame;
        }

        // フレームを送信
        function sendFrame(frameIndex) {
            animCurrentFrame = frameIndex;
            mapFrame.contentWindow.postMessage({ type: 'goto_frame', frame: frameIndex }, '*');
            updateDateDisplay();
        }

        // 再生開始
        function startAnimation() {
            animPlaying = true;
            btnPlay.innerHTML = '&#9646;&#9646;'; // 一時停止アイコン
            btnPlay.title = '一時停止';

            animTimer = setInterval(function() {
                if (animCurrentFrame >= animTotalFrames - 1) {
                    // 最終フレーム到達 → 停止
                    stopAnimation();
                    return;
                }
                animCurrentFrame++;
                sendFrame(animCurrentFrame);
            }, ANIM_INTERVAL_MS);
        }

        // 一時停止
        function stopAnimation() {
            animPlaying = false;
            if (animTimer) {
                clearInterval(animTimer);
                animTimer = null;
            }
            btnPlay.innerHTML = '&#9654;'; // 再生アイコン
            btnPlay.title = '再生';
        }

        // 再生/一時停止ボタン
        btnPlay.addEventListener('click', function() {
            if (animPlaying) {
                stopAnimation();
            } else {
                // 最終フレームにいる場合は先頭から
                if (animCurrentFrame >= animTotalFrames - 1) {
                    animCurrentFrame = 0;
                    sendFrame(0);
                }
                startAnimation();
            }
        });

        // 巻き戻しボタン: 前年1月1日に戻ってアニメーション開始
        btnRewind.addEventListener('click', function() {
            stopAnimation();
            animCurrentFrame = 0;
            sendFrame(0);
            startAnimation();
        });

        // 早送りボタン: 最新フレームに飛んで停止
        btnFfwd.addEventListener('click', function() {
            stopAnimation();
            animCurrentFrame = animTotalFrames - 1;
            sendFrame(animCurrentFrame);
        });

        // プログレスバーのドラッグ
        progressBar.addEventListener('input', function() {
            const wasPlaying = animPlaying;
            if (animPlaying) stopAnimation();
            animCurrentFrame = parseInt(this.value);
            sendFrame(animCurrentFrame);
        });

        // ===== 害虫ボタン・説明文 =====
        let pestsList = [];
        async function loadPests() {
            try {
                const response = await fetch('/api/pests');
                const pests = await response.json();
                pestsList = pests;

                const pestButtonsContainer = document.getElementById('pest-buttons');
                pestButtonsContainer.innerHTML = '';

                pests.forEach(pest => {
                    const button = document.createElement('button');
                    button.className = 'map-button';
                    button.textContent = pest.name;
                    button.onclick = () => changeMap(pest.name);
                    pestButtonsContainer.appendChild(button);
                });

                // 最初の害虫を選択
                if (pests.length > 0) {
                    changeMap(pests[0].name);
                }
            } catch (error) {
                console.error('Error loading pests:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadPests();
            initHerbicidePanel();
        });

        function changeMap(pestName) {
            const pestIdMap = {
                'シバツトガ': 'shibatuga',
                'スジキリヨトウ': 'sujikiri',
                'マメコガネ': 'mamekogane',
                'タマナヤガ': 'tamanayaga',
                'ダラースポット': 'dollerspot',
                'スズメノカタビラ': 'katabira'
            };

            const pestId = pestIdMap[pestName];
            if (pestId) {
                // 凡例の更新
                const legendImage = document.getElementById('legend-image');
                const timestamp = new Date().getTime();
                legendImage.src = '/output/' + pestId + '_legend.png?t=' + timestamp;

                // 説明文を更新
                const descriptionText = document.getElementById('description-text');
                const pest = pestsList.find(p => p.name === pestName);
                if (pest && pest.description) {
                    descriptionText.textContent = pest.description;
                } else {
                    descriptionText.textContent = pestName + 'の説明が見つかりません。';
                }

                // ボタンのアクティブ状態を更新
                const buttons = document.querySelectorAll('.map-button');
                buttons.forEach(button => {
                    button.classList.remove('active');
                    if (button.textContent === pestName) {
                        button.classList.add('active');
                    }
                });

                // iframe に害虫切替を通知
                mapFrame.contentWindow.postMessage({ type: 'change_pest', pestId: pestId }, '*');

                // アニメーション再生中の場合は停止して最新表示に戻す
                if (animPlaying) {
                    stopAnimation();
                }
                if (animTotalFrames > 0) {
                    animCurrentFrame = animTotalFrames - 1;
                    sendFrame(animCurrentFrame);
                }
            }
        }

        // 日付を「YYYY年MM月DD日現在」形式で表示
        const now = new Date();
        const y = now.getFullYear();
        const m = (now.getMonth() + 1).toString().padStart(2, '0');
        const d = now.getDate().toString().padStart(2, '0');
        document.getElementById('current-date').textContent = y + '\u5e74' + m + '\u6708' + d + '\u65e5\u73fe\u5728';

        // ===== 薬剤GDD・座標 =====
        const GDD_MAX = 400;
        const DEFAULT_LAT = 35.68;
        const DEFAULT_LON = 139.76;
        const COOKIE_DAYS = 365;

        function setCookie(name, value) {
            const expires = new Date(Date.now() + COOKIE_DAYS * 864e5).toUTCString();
            document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + expires + ';path=/;SameSite=Lax';
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
            return match ? decodeURIComponent(match[1]) : null;
        }

        function formatGdd(n) {
            return Number(n).toFixed(1);
        }

        function getCoordsFromInputs() {
            const lat = parseFloat(document.getElementById('input-lat').value);
            const lon = parseFloat(document.getElementById('input-lon').value);
            if (isNaN(lat) || isNaN(lon)) return null;
            return { lat: lat, lon: lon };
        }

        function saveCoordCookies(lat, lon) {
            setCookie('agromap_lat', String(lat));
            setCookie('agromap_lon', String(lon));
        }

        function sendMapPin(lat, lon) {
            if (mapFrame.contentWindow) {
                mapFrame.contentWindow.postMessage({ type: 'set_location', lat: lat, lon: lon }, '*');
            }
        }

        function applyCoords(lat, lon) {
            document.getElementById('input-lat').value = lat;
            document.getElementById('input-lon').value = lon;
            saveCoordCookies(lat, lon);
            sendMapPin(lat, lon);
            refreshAllGdd();
        }

        function onCoordsEnter() {
            const c = getCoordsFromInputs();
            if (!c) return;
            applyCoords(c.lat, c.lon);
        }

        function pctOfMax(gdd) {
            return Math.min(100, Math.max(0, (gdd / GDD_MAX) * 100));
        }

        function renderGaugeScale(scaleEl, mode) {
            if (!scaleEl) return;
            const ticks = mode === 'primomax'
                ? [
                    { value: 0, label: '0', edge: 'start' },
                    { value: 200, label: '200' },
                    { value: 400, label: '400℃日', edge: 'end' }
                ]
                : [
                    { value: 0, label: '0', edge: 'start' },
                    { value: 300, label: '300' },
                    { value: 350, label: '350' },
                    { value: 400, label: '400℃日', edge: 'end' }
                ];
            scaleEl.innerHTML = '';
            ticks.forEach(function(tick) {
                const span = document.createElement('span');
                span.textContent = tick.label;
                span.style.left = pctOfMax(tick.value) + '%';
                if (tick.edge === 'start') span.className = 'scale-start';
                else if (tick.edge === 'end') span.className = 'scale-end';
                scaleEl.appendChild(span);
            });
        }

        function renderGauge(trackEl, gdd, mode) {
            trackEl.innerHTML = '';
            const scaleEl = trackEl.parentElement.querySelector('.gdd-gauge-scale');
            renderGaugeScale(scaleEl, mode);
            const totalPct = pctOfMax(gdd);

            function addSeg(cls, leftPct, widthPct) {
                if (widthPct <= 0) return;
                const el = document.createElement('div');
                el.className = 'gdd-gauge-seg ' + cls;
                el.style.left = leftPct + '%';
                el.style.width = widthPct + '%';
                trackEl.appendChild(el);
            }

            function addMark(value) {
                const m = document.createElement('div');
                m.className = 'gdd-gauge-mark';
                m.style.left = pctOfMax(value) + '%';
                trackEl.appendChild(m);
            }

            if (mode === 'primomax') {
                addMark(200);
                const end = totalPct;
                const t200 = pctOfMax(200);
                if (gdd <= 200) {
                    addSeg('gdd-seg-normal', 0, end);
                } else {
                    addSeg('gdd-seg-normal', 0, t200);
                    addSeg('gdd-seg-over', t200, end - t200);
                }
            } else {
                addMark(300);
                addMark(350);
                const p300 = pctOfMax(300);
                const p350 = pctOfMax(350);
                const end = totalPct;
                if (gdd <= 300) {
                    addSeg('gdd-seg-normal', 0, end);
                } else if (gdd <= 350) {
                    addSeg('gdd-seg-normal', 0, p300);
                    addSeg('gdd-seg-window', p300, end - p300);
                } else {
                    addSeg('gdd-seg-normal', 0, p300);
                    addSeg('gdd-seg-window', p300, p350 - p300);
                    addSeg('gdd-seg-over', p350, end - p350);
                }
            }
        }

        function primomaxMessage(gdd) {
            const s = formatGdd(gdd);
            if (gdd < 200) {
                return '現在' + s + 'GDDです。散布適時まであと' + formatGdd(200 - gdd) + 'GDDです';
            }
            return '現在' + s + 'GDDです。リバウンドの目安までを' + formatGdd(gdd - 200) + 'GDD超えています';
        }

        function greenfieldMessage(gdd) {
            const s = formatGdd(gdd);
            if (gdd < 300) {
                return '現在' + s + 'GDDです。散布適時まであと' + formatGdd(300 - gdd) + 'GDDです';
            }
            if (gdd <= 350) {
                return '現在' + s + 'GDDです。散布適時です';
            }
            return '現在' + s + 'GDDです。リバウンドの目安までを' + formatGdd(gdd - 350) + 'GDD超えています';
        }

        async function fetchGdd(lat, lon, startDate) {
            const url = '/api/gdd?lat=' + encodeURIComponent(lat) +
                '&lon=' + encodeURIComponent(lon) +
                '&start_date=' + encodeURIComponent(startDate) +
                '&base_temp=0';
            const res = await fetch(url);
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'GDD取得に失敗しました');
            return data.gdd;
        }

        async function updateProductGdd(product) {
            const dateEl = document.getElementById('date-' + product);
            const msgEl = document.getElementById('msg-' + product);
            const gaugeEl = document.getElementById('gauge-' + product);
            const startDate = dateEl.value;

            if (!startDate) {
                msgEl.textContent = '散布日を選択してください';
                gaugeEl.innerHTML = '';
                renderGaugeScale(
                    document.getElementById('scale-' + product),
                    product === 'primomax' ? 'primomax' : 'greenfield'
                );
                return;
            }

            const coords = getCoordsFromInputs();
            if (!coords) {
                msgEl.textContent = '有効な座標を入力してください';
                return;
            }

            msgEl.textContent = '計算中...';
            try {
                const gdd = await fetchGdd(coords.lat, coords.lon, startDate);
                renderGauge(gaugeEl, gdd, product === 'primomax' ? 'primomax' : 'greenfield');
                msgEl.textContent = product === 'primomax' ? primomaxMessage(gdd) : greenfieldMessage(gdd);
            } catch (err) {
                msgEl.textContent = err.message || '計算に失敗しました';
                gaugeEl.innerHTML = '';
            }
        }

        function refreshAllGdd() {
            updateProductGdd('primomax');
            updateProductGdd('greenfield');
        }

        function initHerbicidePanel() {
            const latInput = document.getElementById('input-lat');
            const lonInput = document.getElementById('input-lon');
            const geoError = document.getElementById('geo-error');

            const cookieLat = getCookie('agromap_lat');
            const cookieLon = getCookie('agromap_lon');
            const lat = cookieLat !== null ? parseFloat(cookieLat) : DEFAULT_LAT;
            const lon = cookieLon !== null ? parseFloat(cookieLon) : DEFAULT_LON;
            latInput.value = lat;
            lonInput.value = lon;

            const primoDate = getCookie('agromap_primomax_date');
            const greenDate = getCookie('agromap_greenfield_date');
            if (primoDate) document.getElementById('date-primomax').value = primoDate;
            if (greenDate) document.getElementById('date-greenfield').value = greenDate;

            function onCoordKeydown(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    onCoordsEnter();
                }
            }
            latInput.addEventListener('keydown', onCoordKeydown);
            lonInput.addEventListener('keydown', onCoordKeydown);

            mapFrame.addEventListener('load', function() {
                sendMapPin(lat, lon);
            });
            if (mapFrame.contentDocument && mapFrame.contentDocument.readyState === 'complete') {
                sendMapPin(lat, lon);
            }

            document.getElementById('date-primomax').addEventListener('change', function() {
                if (this.value) setCookie('agromap_primomax_date', this.value);
                updateProductGdd('primomax');
            });
            document.getElementById('date-greenfield').addEventListener('change', function() {
                if (this.value) setCookie('agromap_greenfield_date', this.value);
                updateProductGdd('greenfield');
            });

            document.getElementById('btn-geo').addEventListener('click', function() {
                geoError.textContent = '';
                if (!navigator.geolocation) {
                    geoError.textContent = 'お使いのブラウザは位置情報に対応していません';
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        applyCoords(pos.coords.latitude, pos.coords.longitude);
                    },
                    function() {
                        geoError.textContent = '現在地を取得できませんでした。前回の座標を使用しています';
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
                );
            });

            renderGaugeScale(document.getElementById('scale-primomax'), 'primomax');
            renderGaugeScale(document.getElementById('scale-greenfield'), 'greenfield');
            refreshAllGdd();
        }
    </script>
</body>
</html>
